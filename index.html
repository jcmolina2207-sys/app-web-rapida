<style>
  /* ============================
     CSS VARIABLES & RESET
  ============================ */
  :root {
    --bg: #f0f5ff;
    --surface: #ffffff;
    --surface2: #e8f0fe;
    --border: #c7d9f8;
    --text: #0d1b3e;
    --text2: #3a5080;
    --text3: #7a9bbf;
    --accent: #3b72d9;
    --accent2: #5b8ff0;
    --accent-light: #dbeafe;
    --green: #1e7a5a;
    --green-light: #d1faee;
    --yellow: #a06010;
    --yellow-light: #fef9c3;
    --red: #c0392b;
    --red-light: #fee2e2;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --shadow: 0 2px 12px rgba(13,27,62,0.09);
    --shadow-lg: 0 8px 32px rgba(13,27,62,0.16);
    --radius: 16px;
    --radius-sm: 10px;
    --nav-h: 68px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --transition: 0.2s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ============================
     APP SHELL
  ============================ */
  #app {
    display: flex; flex-direction: column;
    height: 100%; width: 100%; max-width: 430px;
    margin: 0 auto; position: relative;
    background: var(--bg);
    box-shadow: 0 0 60px rgba(0,0,0,.12);
    overflow: hidden;
  }

  /* ============================
     HEADER
  ============================ */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-logo { height: 40px; width: auto; }
  .app-header h1 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    letter-spacing: -.3px;
  }
  .app-header .subtitle {
    font-size: 11px; color: var(--text3);
    font-weight: 400; letter-spacing: .5px;
    text-transform: uppercase;
  }
  .header-date {
    font-size: 12px; color: var(--text2);
    font-weight: 500; text-align: right;
  }

  /* ============================
     SCREENS
  ============================ */
  #screen-container {
    flex: 1; overflow: hidden; position: relative;
  }
  .screen {
    position: absolute; inset: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px calc(var(--nav-h) + 24px);
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: opacity var(--transition), transform var(--transition);
    -webkit-overflow-scrolling: touch;
  }
  .screen.active {
    opacity: 1; pointer-events: all;
    transform: translateY(0);
  }

  /* ============================
     BOTTOM NAV
  ============================ */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(13,27,62,.06);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; cursor: pointer;
    padding: 8px 4px;
    border: none; background: none;
    transition: color var(--transition), transform var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item .nav-icon { font-size: 22px; line-height: 1; }
  .nav-item .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .3px; }
  .nav-item { color: var(--text3); }
  .nav-item.active { color: var(--accent); }
  .nav-item:active { transform: scale(.92); }

  /* ============================
     FAB
  ============================ */
  .fab {
    position: absolute; bottom: calc(var(--nav-h) + 16px); right: 16px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent);
    color: #fff; font-size: 28px; line-height: 1;
    border: none; cursor: pointer; z-index: 200;
    box-shadow: 0 4px 20px rgba(59,114,217,.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  .fab:active { transform: scale(.93); box-shadow: 0 2px 10px rgba(59,114,217,.3); }
  .fab.open { transform: rotate(45deg); }

  /* FAB MENU */
  .fab-menu {
    position: absolute; bottom: calc(var(--nav-h) + 80px); right: 16px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 199; opacity: 0; pointer-events: none;
    transform: scale(.85) translateY(10px);
    transform-origin: bottom right;
    transition: opacity .2s, transform .2s;
  }
  .fab-menu.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
  .fab-menu-item {
    display: flex; align-items: center; gap: 10px; justify-content: flex-end;
    cursor: pointer;
  }
  .fab-menu-item span:first-child {
    background: var(--surface); color: var(--text);
    padding: 6px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }
  .fab-menu-item span:last-child {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 2px 10px rgba(59,114,217,.35);
    flex-shrink: 0;
  }

  .fab-overlay {
    position: absolute; inset: 0; z-index: 198;
    background: rgba(13,27,62,.25);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .fab-overlay.open { opacity: 1; pointer-events: all; }

  /* ============================
     CARDS
  ============================ */
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 15px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .card-icon { font-size: 16px; }

  /* ============================
     SECTION HEADERS
  ============================ */
  .section-title {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
  }
  .section-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }

  /* ============================
     BADGES / CHIPS
  ============================ */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: .3px;
    text-transform: uppercase;
  }
  .badge-pending { background: var(--yellow-light); color: var(--yellow); }
  .badge-prep    { background: var(--blue-light);   color: var(--blue); }
  .badge-done    { background: var(--green-light);  color: var(--green); }
  .badge-paid    { background: var(--green-light);  color: var(--green); }
  .badge-unpaid  { background: var(--red-light);    color: var(--red); }

  /* ============================
     PROGRESS BARS
  ============================ */
  .progress-wrap {
    background: var(--border); border-radius: 99px;
    height: 8px; overflow: hidden; width: 100%;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1), background .4s;
  }
  .progress-bar.green { background: var(--green); }
  .progress-bar.yellow { background: var(--yellow); }
  .progress-bar.red { background: var(--red); }

  /* ============================
     BUTTONS
  ============================ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; border: none; cursor: pointer;
    font-family: var(--font-body); font-weight: 600;
    border-radius: var(--radius-sm); transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.95); }
  .btn-primary { background: var(--accent); color: #fff; padding: 10px 18px; font-size: 13px; }
  .btn-secondary { background: var(--accent-light); color: var(--accent); padding: 10px 18px; font-size: 13px; }
  .btn-ghost { background: transparent; color: var(--accent); padding: 8px 14px; font-size: 13px; border: 1.5px solid var(--accent); }
  .btn-danger { background: var(--red-light); color: var(--red); padding: 8px 14px; font-size: 13px; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-full { width: 100%; }

  /* ============================
     LIST ITEMS (PEDIDOS / ETC)
  ============================ */
  .list-item {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px; box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 10px; cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
    position: relative; overflow: hidden;
  }
  .list-item:active { transform: scale(.985); box-shadow: var(--shadow-lg); }
  .list-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .list-item.pending::before  { background: var(--yellow); }
  .list-item.prep::before     { background: var(--blue); }
  .list-item.done::before     { background: var(--green); }

  .list-item-row { display: flex; align-items: center; justify-content: space-between; }
  .list-item-title { font-weight: 600; font-size: 14px; color: var(--text); }
  .list-item-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .list-item-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

  /* ============================
     SUMMARY ROW (FINANZAS)
  ============================ */
  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 16px;
  }
  .summary-card {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 12px; box-shadow: var(--shadow);
    border: 1px solid var(--border); text-align: center;
  }
  .summary-card .amount {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 700; color: var(--text);
    margin-top: 4px;
  }
  .summary-card .label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; }
  .summary-card.income .amount { color: var(--green); }
  .summary-card.expense .amount { color: var(--red); }

  /* ============================
     FILTERS
  ============================ */
  .filter-row {
    display: flex; gap: 8px; margin-bottom: 14px;
    overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    cursor: pointer; white-space: nowrap;
    transition: all var(--transition); flex-shrink: 0;
  }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-chip:active { transform: scale(.94); }

  /* ============================
     EMPTY STATE
  ============================ */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text3);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .6; }
  .empty-state p { font-size: 14px; }

  /* ============================
     INPUTS (FORMS)
  ============================ */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .4px; }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 14px; color: var(--text);
    background: var(--surface);
    transition: border-color var(--transition);
    outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  select.form-input { cursor: pointer; }

  /* ============================
     MODAL / SHEET
  ============================ */
  .modal-overlay {
    position: absolute; inset: 0; z-index: 300;
    background: rgba(13,27,62,.5);
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    display: flex; align-items: flex-end;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 8px 20px 40px;
    width: 100%;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 10px auto 20px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 700; color: var(--text);
    margin-bottom: 20px;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  /* ============================
     CONFIRM DIALOG
  ============================ */
  .confirm-overlay {
    position: absolute; inset: 0; z-index: 400;
    background: rgba(13,27,62,.6);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 24px; max-width: 320px; width: 100%;
    box-shadow: var(--shadow-lg);
    transform: scale(.9);
    transition: transform .2s;
  }
  .confirm-overlay.open .confirm-box { transform: scale(1); }
  .confirm-box h3 { font-family: var(--font-display); font-size: 18px; margin-bottom: 8px; }
  .confirm-box p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }

  /* ============================
     TOAST
  ============================ */
  .toast {
    position: absolute; bottom: calc(var(--nav-h) + 76px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #0d1b3e; color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 500;
    opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============================
     INGREDIENT ITEM
  ============================ */
  .ingredient-item {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px; box-shadow: var(--shadow);
    border: 1px solid var(--border); margin-bottom: 10px;
  }
  .ingredient-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ingredient-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .ingredient-amounts { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .ingredient-actions { display: flex; gap: 6px; margin-top: 10px; }

  /* ============================
     NOTA ITEM
  ============================ */
  .nota-item {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 14px; box-shadow: var(--shadow);
    border: 1px solid var(--border); margin-bottom: 10px;
    border-left: 4px solid var(--accent2);
    cursor: pointer;
    transition: transform var(--transition);
  }
  .nota-item:active { transform: scale(.985); }
  .nota-date { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .nota-text { font-size: 14px; color: var(--text); line-height: 1.5; }
  .nota-actions { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; }

  /* ============================
     FINANCE ITEM
  ============================ */
  .finance-item {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 12px 14px; box-shadow: var(--shadow);
    border: 1px solid var(--border); margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .finance-dot {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .finance-dot.income { background: var(--green-light); }
  .finance-dot.expense { background: var(--red-light); }
  .finance-info { flex: 1; min-width: 0; }
  .finance-desc { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .finance-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .finance-amount { font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .finance-amount.income { color: var(--green); }
  .finance-amount.expense { color: var(--red); }

  /* ============================
     DASHBOARD SPECIFICS
  ============================ */
  .dash-greeting {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
  }
  .dash-date { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .dash-saldo-big {
    font-family: var(--font-display);
    font-size: 32px; font-weight: 700; color: var(--text);
    margin: 4px 0;
  }
  .dash-change { font-size: 13px; font-weight: 500; }
  .dash-change.pos { color: var(--green); }
  .dash-change.neg { color: var(--red); }
  .dash-change.neu { color: var(--text3); }

  /* ============================
     PEDIDO DETAIL CARD
  ============================ */
  .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .label { color: var(--text2); font-size: 13px; }
  .detail-row .value { font-weight: 600; color: var(--text); }

  /* swipe action hint */
  .swipe-hint { font-size: 11px; color: var(--text3); text-align: center; margin-bottom: 8px; }

  /* animaciones */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeIn .3s ease forwards; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .6; }
  }
  .pulse { animation: pulse 2s ease infinite; }

  /* scrollbar */
  .screen::-webkit-scrollbar { width: 3px; }
  .screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ============================
     UTILS
  ============================ */
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
  .gap-8 { gap: 8px; }
  .gap-10 { gap: 10px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .text-right { text-align: right; }
  .text-sm { font-size: 12px; }
  .text-muted { color: var(--text3); }
  .fw-600 { font-weight: 600; }
  .w-100 { width: 100%; }

  /* Textarea */
  textarea.form-input { resize: vertical; min-height: 90px; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* Cliente autocomplete */
  .cliente-wrap { position: relative; }
  .cliente-dropdown {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm); z-index: 999;
    box-shadow: var(--shadow-lg); max-height: 180px;
    overflow-y: auto; display: none;
  }
  .cliente-dropdown.open { display: block; }
  .cliente-option {
    padding: 10px 14px; cursor: pointer;
    font-size: 13px; color: var(--text);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  .cliente-option:last-child { border-bottom: none; }
  .cliente-option:hover,
  .cliente-option.focused { background: var(--accent-light); }
  .cliente-option-name { font-weight: 600; }
  .cliente-option-meta { font-size: 11px; color: var(--text3); }

  /* Historial cliente */
  .cliente-card {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px; box-shadow: var(--shadow);
    border: 1px solid var(--border); margin-bottom: 10px;
    cursor: pointer; transition: transform var(--transition);
  }
  .cliente-card:active { transform: scale(.985); }
  .cliente-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .cliente-card-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .cliente-card-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .cliente-stat { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 3px 8px; border-radius: 10px; }

  /* Multi-producto */
  .items-list { margin-bottom: 12px; }
  .item-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .item-row-info { flex: 1; min-width: 0; }
  .item-row-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .item-row-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .item-row-price { font-weight: 700; font-size: 14px; color: var(--accent); flex-shrink: 0; }
  .item-row-del {
    background: var(--red-light); color: var(--red);
    border: none; border-radius: 50%; width: 28px; height: 28px;
    font-size: 14px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-top: 2px solid var(--border);
    font-weight: 700; font-size: 15px; color: var(--text);
    margin-bottom: 4px;
  }

  /* ============================
     DESKTOP RESPONSIVE
  ============================ */
  .sidebar-brand { display: none; }
  .main-area { display: contents; }
  .app-header-title { display: none; }

  @media (min-width: 768px) {
    html, body {
      overflow: auto;
      background: #d6e4f7;
    }
    #app {
      flex-direction: row;
      max-width: 1240px;
      height: calc(100vh - 48px);
      margin: 24px auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(13,27,62,.22);
    }
    .bottom-nav {
      position: relative;
      flex-direction: column;
      width: 220px; min-width: 220px;
      height: 100%;
      border-top: none;
      border-right: 1px solid var(--border);
      box-shadow: none;
      padding: 0 12px 20px;
      justify-content: flex-start;
      align-items: stretch;
      gap: 2px;
      flex-shrink: 0;
      overflow-y: auto;
      background: var(--surface);
    }
    .nav-item {
      flex-direction: row;
      justify-content: flex-start;
      gap: 12px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      width: 100%;
    }
    .nav-item .nav-icon { font-size: 19px; }
    .nav-item .nav-label { font-size: 14px; font-weight: 500; }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }
    .nav-item:hover:not(.active) { background: var(--bg); }
    .sidebar-brand {
      display: flex !important;
      flex-direction: column;
      padding: 24px 8px 20px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
    }
    .sidebar-brand h2 {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: var(--accent); line-height: 1.2;
    }
    .sidebar-brand span {
      font-size: 10px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .6px; margin-top: 2px;
    }
    .sidebar-footer {
      margin-top: auto; padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3); text-align: center;
    }
    .main-area {
      display: flex !important;
      flex-direction: column;
      flex: 1; overflow: hidden; min-width: 0;
      background: var(--bg);
    }
    .app-header {
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      background: #ffffff;
    }
    .app-header h1 { display: none; }
    .app-header .subtitle { display: none; }
    .app-header-title {
      display: block !important;
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700; color: var(--text);
    }
    #screen-container { flex: 1; overflow: hidden; position: relative; }
    .screen { padding: 28px 32px 32px; }
    .screen::-webkit-scrollbar { width: 5px; }
    .dash-grid { display: grid !important; grid-template-columns: 1fr 1fr; gap: 16px; }
    .dash-grid > .card { margin-bottom: 0; }
    .dash-grid > .card.full-width { grid-column: 1 / -1; }
    .list-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .list-2col > * { margin-bottom: 0 !important; }
    .fab { bottom: 28px; right: 28px; }
    .fab-menu { bottom: 92px; right: 28px; }
    .dash-saldo-big { font-size: 38px; }
  }
  @media (min-width: 1100px) {
    .bottom-nav { width: 240px; min-width: 240px; }
  }

  /* ============================
     PRODUCTO AUTOCOMPLETE
  ============================ */
  .producto-wrap { position: relative; }
  .producto-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    z-index: 999;
    max-height: 260px; overflow-y: auto;
    display: none;
  }
  .producto-dropdown.open { display: block; }
  .prod-cat {
    padding: 8px 12px 4px;
    font-size: 10px; font-weight: 700;
    color: var(--accent); letter-spacing: .6px;
    text-transform: uppercase;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  .prod-option {
    padding: 10px 14px;
    font-size: 14px; color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
    transition: background var(--transition);
  }
  .prod-option:last-child { border-bottom: none; }
  .prod-option:hover, .prod-option.highlighted { background: var(--accent-light); }
  .prod-option .prod-precio {
    font-size: 12px; font-weight: 600;
    color: var(--accent); white-space: nowrap;
  }
  .prod-option mark {
    background: #bfdbfe; color: var(--text); border-radius: 2px; padding: 0 2px;
  }
</style>

<body>
<div id="app">
  <!-- BOTTOM NAV / SIDEBAR -->
  <nav class="bottom-nav" id="bottom-nav-placeholder">

<script>
/* ============================================================
   FIREBASE CONFIG
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBjvyLCF7leohdUXQUnv2v2MtW1kb_F4Y8",
  authDomain: "toque-artesano.firebaseapp.com",
  projectId: "toque-artesano",
  storageBucket: "toque-artesano.firebasestorage.app",
  messagingSenderId: "1009533231670",
  appId: "1:1009533231670:web:d604c07152e505b6d7ae97"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ============================================================
   ESTADO GLOBAL + SINCRONIZACIÓN FIREBASE
============================================================ */
let state = {
  pedidos: [],
  ingredientes: [],
  movimientos: [],
  notas: [],
  nextId: 1,
};

let _nextIdFromDB = 1;

// Sync status UI
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  if (status === 'ok') {
    dot.style.background = 'var(--green)';
    label.textContent = 'Sincronizado';
  } else if (status === 'saving') {
    dot.style.background = 'var(--yellow)';
    label.textContent = 'Guardando...';
  } else if (status === 'error') {
    dot.style.background = 'var(--red)';
    label.textContent = 'Sin conexión';
  } else {
    dot.style.background = 'var(--text3)';
    label.textContent = 'Conectando...';
  }
}

// Save a collection to Firestore
async function saveCollection(colName, items) {
  setSyncStatus('saving');
  try {
    const col = db.collection(colName);
    // Use a single doc per collection for simplicity (small data)
    await db.collection('app').doc(colName).set({ items: items });
    setSyncStatus('ok');
  } catch(e) {
    console.error('Save error', e);
    setSyncStatus('error');
    // Fallback to localStorage
    localStorage.setItem('toque_artesano_v3', JSON.stringify(state));
  }
}

async function saveNextId(id) {
  try {
    await db.collection('app').doc('meta').set({ nextId: id });
  } catch(e) {}
}

function saveState() {
  saveCollection('pedidos', state.pedidos);
  saveCollection('ingredientes', state.ingredientes);
  saveCollection('movimientos', state.movimientos);
  saveCollection('notas', state.notas);
  saveNextId(state.nextId);
  // Also save locally as backup
  localStorage.setItem('toque_artesano_v3', JSON.stringify(state));
}

function nextId() { return ++state.nextId; }

// Parsear precio formato argentino: 17.600 → 17600, 17,5 → 17.5
function parsePrecio(val) {
  if (!val && val !== 0) return 0;
  const s = String(val).trim().replace(/\s/g, '');
  // Tiene punto Y coma: 17.600,50
  if (s.includes('.') && s.includes(',')) {
    return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
  }
  // Solo punto: si la parte tras el punto tiene 3 dígitos = separador de miles
  if (s.includes('.')) {
    const partes = s.split('.');
    if (partes[partes.length - 1].length === 3) {
      return parseFloat(s.replace(/\./g, '')) || 0;
    }
    return parseFloat(s) || 0;
  }
  // Solo coma = decimal
  if (s.includes(',')) {
    return parseFloat(s.replace(',', '.')) || 0;
  }
  return parseFloat(s) || 0;
}

// Load all data from Firestore on startup
async function loadFromFirebase() {
  setSyncStatus('connecting');

  // Siempre cargar localStorage primero como base
  try {
    const raw = localStorage.getItem('toque_artesano_v3');
    if (raw) {
      const local = JSON.parse(raw);
      state = { ...state, ...local };
    }
  } catch(e) {}

  // Renderizar inmediatamente con datos locales
  renderInicio();
  setInterval(updateHeaderDate, 30000);

  // Luego intentar Firebase con timeout de 5 segundos
  const firebasePromise = (async () => {
    const cols = ['pedidos','ingredientes','movimientos','notas'];
    const results = await Promise.all(
      cols.map(c => db.collection('app').doc(c).get())
    );
    const metaDoc = await db.collection('app').doc('meta').get();

    cols.forEach((c, i) => {
      if (results[i].exists) {
        state[c] = results[i].data().items || [];
      }
    });

    if (metaDoc.exists) {
      state.nextId = metaDoc.data().nextId || 1;
    }
    setSyncStatus('ok');
    renderScreen(activeScreen);
  })();

  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('timeout')), 5000)
  );

  try {
    await Promise.race([firebasePromise, timeoutPromise]);
  } catch(e) {
    console.warn('Firebase no disponible, usando datos locales:', e.message);
    setSyncStatus('error');
  }
}

// Real-time listeners for live sync between devices
function setupRealtimeSync() {
  const cols = ['pedidos','ingredientes','movimientos','notas'];
  cols.forEach(c => {
    db.collection('app').doc(c).onSnapshot(doc => {
      if (doc.exists) {
        state[c] = doc.data().items || [];
        renderScreen(activeScreen);
        setSyncStatus('ok');
      }
    }, err => {
      setSyncStatus('error');
    });
  });
}

/* ============================================================
   HELPERS
============================================================ */
function fmt(n) {
  return '$' + Math.round(Number(n)).toLocaleString('es-AR');
}
function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}
function todayStr() {
  // Usar fecha LOCAL (no UTC) para evitar problemas de zona horaria GMT-3
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function stockPct(ing) {
  return Math.min(100, Math.round((ing.stock / ing.ideal) * 100));
}
function stockColor(pct) {
  if (pct >= 60) return 'green';
  if (pct >= 30) return 'yellow';
  return 'red';
}
function globalStockPct() {
  if (!state.ingredientes.length) return 100;
  const total = state.ingredientes.reduce((s, i) => s + stockPct(i), 0);
  return Math.round(total / state.ingredientes.length);
}
function totalSaldo() {
  return state.movimientos.reduce((s, m) => m.tipo === 'income' ? s + m.monto : s - m.monto, 0);
}
function totalIngresos() {
  return state.movimientos.filter(m => m.tipo === 'income').reduce((s, m) => s + m.monto, 0);
}
function totalEgresos() {
  return state.movimientos.filter(m => m.tipo === 'expense').reduce((s, m) => s + m.monto, 0);
}
function cambioHoy() {
  const hoy = todayStr();
  return state.movimientos.filter(m => m.fecha === hoy)
    .reduce((s, m) => m.tipo === 'income' ? s + m.monto : s - m.monto, 0);
}
function estadoLabel(e) {
  return { pending: 'Pendiente', prep: 'En preparación', done: 'Entregado' }[e] || e;
}
function estadoBadge(e) {
  return { pending: 'badge-pending', prep: 'badge-prep', done: 'badge-done' }[e] || '';
}
function estadoClass(e) {
  return { pending: 'pending', prep: 'prep', done: 'done' }[e] || '';
}
function nextPedido() {
  const activos = state.pedidos.filter(p => p.estado !== 'done');
  activos.sort((a, b) => (a.fechaEntrega + a.hora).localeCompare(b.fechaEntrega + b.hora));
  return activos[0] || null;
}
function lastNota() {
  const sorted = [...state.notas].sort((a,b) => b.fecha.localeCompare(a.fecha));
  return sorted[0] || null;
}

const screens = ['inicio','pedidos','stock','finanzas','notas','clientes'];

const screenTitles = {
  inicio: 'Inicio', pedidos: 'Pedidos',
  stock: 'Materia Prima', finanzas: 'Finanzas', notas: 'Anotaciones', clientes: 'Clientes'
};
function navigate(screen) {
  if (!screens.includes(screen)) return;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.querySelectorAll(`.nav-item[data-screen="${screen}"]`).forEach(n => n.classList.add('active'));
  const titleEl = document.getElementById('header-screen-title');
  if (titleEl) titleEl.textContent = screenTitles[screen] || screen;
  activeScreen = screen;
  renderScreen(screen);
  closeFab();
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.screen));
});

let pedidoFiltro = 'all';
function renderPedidos() {
  const el = document.getElementById('screen-pedidos');
  const filtros = [
    { key: 'all', label: 'Todos' },
    { key: 'pending', label: '⏳ Pendiente' },
    { key: 'prep', label: '🔵 En preparación' },
    { key: 'done', label: '✅ Entregados' },
  ];
  const filtrados = pedidoFiltro === 'all' ? state.pedidos : state.pedidos.filter(p => p.estado === pedidoFiltro);
  // sort: pending/prep first, by date
  const sorted = [...filtrados].sort((a, b) => {
    if (a.estado === 'done' && b.estado !== 'done') return 1;
    if (b.estado === 'done' && a.estado !== 'done') return -1;
    return (a.fechaEntrega + a.hora).localeCompare(b.fechaEntrega + b.hora);
  });

  el.innerHTML = `
    <div class="section-title">Pedidos</div>
    <div class="section-sub">${state.pedidos.length} pedidos en total</div>
    <div class="filter-row">
      ${filtros.map(f => `<div class="filter-chip ${pedidoFiltro===f.key?'active':''}" onclick="setPedidoFiltro('${f.key}')">${f.label}</div>`).join('')}
    </div>
    ${sorted.length === 0 ? `<div class="empty-state"><div class="empty-icon">📦</div><p>Sin pedidos en esta categoría</p></div>` :
      `<div class="list-2col">${sorted.map(p => pedidoCard(p)).join('')}</div>`
    }
    <div style="height:8px"></div>
  `;
}

      <button class="btn btn-danger btn-sm" onclick="confirmEliminarPedido(${p.id})">🗑 Eliminar</button>
    </div>
  `);
}

function marcarEntregado(id, fromDash) {
  const p = state.pedidos.find(x => x.id === id);
  if (!p || p.estado === 'done') return;
  p.estado = 'done';
  // auto-ingreso
  const yaExiste = state.movimientos.some(m => m.auto && m.descripcion.includes(p.cliente) && m.descripcion.includes(p.producto.substring(0, 15)));
  if (!yaExiste) {
    state.movimientos.unshift({
      id: nextId(), tipo: 'income',
      descripcion: `${p.producto} - ${p.cliente}`,
      monto: p.precio, fecha: todayStr(), auto: true
    });
  }
  saveState();
  closeModal();
  showToast('✅ Pedido entregado · Ingreso registrado');
  renderScreen(activeScreen);
}

function marcarPagado(id) {
  const p = state.pedidos.find(x => x.id === id);
  if (!p) return;
  p.pagado = true;
  saveState();
  closeModal();
  showToast('💰 Pago registrado');
  renderScreen(activeScreen);
}

function confirmEliminarPedido(id) {
  showConfirm('¿Eliminar pedido?', 'Esta acción no se puede deshacer.', () => {
    state.pedidos = state.pedidos.filter(p => p.id !== id);
    saveState(); closeModal();
    showToast('Pedido eliminado');
    renderScreen(activeScreen);
  });
}

function agregarItemPedido() {
  const prod = document.getElementById('f-producto')?.value.trim();
  const cant = parseInt(document.getElementById('f-cantidad')?.value) || 1;
  const precioUnit = parsePrecio(document.getElementById('f-precio-unit')?.value);
  if (!prod) { showToast('⚠️ Escribí un producto'); return; }
  if (!precioUnit) { showToast('⚠️ Ingresá el precio unitario'); return; }
  _pedidoItems.push({ producto: prod, cantidad: cant, precioUnit, subtotal: cant * precioUnit });

function initClienteAutocomplete() {
  const input = document.getElementById('f-cliente');
  const dropdown = document.getElementById('cliente-dropdown');
  if (!input || !dropdown) return;

  function getClienteNames() {
    const nombres = [...new Set(state.pedidos.map(p => p.cliente.trim()).filter(Boolean))];
    return nombres.sort();
  }

  // Normalizar texto para comparar sin tildes ni mayúsculas
  function normalizar(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function showDropdown(filter) {
    if (!filter) { dropdown.classList.remove('open'); return; }
    const nombres = getClienteNames();
    const normFilter = normalizar(filter);

    // Filtrar Y deduplicar por nombre normalizado
    const vistos = new Set();
    const filtrados = [];
    nombres.forEach(n => {
      const norm = normalizar(n);
      if (norm.includes(normFilter) && !vistos.has(norm)) {
        vistos.add(norm);
        filtrados.push(n);
      }
    });

    if (filtrados.length === 0) {
      dropdown.classList.remove('open');
      return;
    }
    const clientes = getClientes();
    dropdown.innerHTML = filtrados.map(n => {
      // Buscar cliente normalizando también
      const c = clientes.find(x => normalizar(x.nombre) === normalizar(n));
      const cant = c ? c.pedidos.length : 1;
      const meta = `(${cant} pedido${cant !== 1 ? 's' : ''})`;
      return `<div class="cliente-option" onclick="seleccionarCliente('${n.replace(/'/g,"\'")}')">
        <span class="cliente-option-name">${n}</span>
        <span class="cliente-option-meta">${meta}</span>
      </div>`;
    }).join('');
    dropdown.classList.add('open');
  }

  input.addEventListener('input', () => { showDropdown(input.value); currentIndex = -1; });
  input.addEventListener('focus', () => { if (input.value) showDropdown(input.value); });

  // Keyboard navigation
  let currentIndex = -1;
  input.addEventListener('keydown', e => {
    const options = dropdown.querySelectorAll('.cliente-option');
    if (!dropdown.classList.contains('open') || options.length === 0) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      currentIndex = Math.min(currentIndex + 1, options.length - 1);
      options.forEach((o, i) => o.classList.toggle('focused', i === currentIndex));
      options[currentIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      currentIndex = Math.max(currentIndex - 1, 0);
      options.forEach((o, i) => o.classList.toggle('focused', i === currentIndex));
      options[currentIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' || e.key === 'Tab') {
      if (currentIndex >= 0 && options[currentIndex]) {
        e.preventDefault();
        options[currentIndex].click();
        currentIndex = -1;
      }
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
      currentIndex = -1;
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.cliente-wrap')) { dropdown.classList.remove('open'); currentIndex = -1; }
  });
}

function seleccionarCliente(nombre) {

function initProductoAutocomplete() {
  const input    = document.getElementById('f-producto');
  const dropdown = document.getElementById('prod-dropdown');
  const cantEl   = document.getElementById('f-cantidad');
  const precioEl = document.getElementById('f-precio-unit');
  if (!input || !dropdown) return;

  // Precio unitario del producto seleccionado (null = sin precio fijo)
  let precioUnitario = null;

  function recalcTotal() {
    if (precioUnitario === null) return;           // sin precio fijo, no tocar
    const cant = parseInt(cantEl.value) || 1;
    // El campo siempre muestra el precio UNITARIO
    precioEl.value = Math.round(precioUnitario);
    const hint = document.getElementById('f-precio-hint');
    if (hint) {
      const total = precioUnitario * cant;
      hint.textContent = cant > 1
        ? `$${Math.round(precioUnitario).toLocaleString('es-AR')} c/u \u00d7 ${cant} = $${Math.round(total).toLocaleString('es-AR')} total`
        : `$${Math.round(precioUnitario).toLocaleString('es-AR')} c/u`;
    }
  }

  function setPrecioUnitario(pr) {
    precioUnitario = pr ? Number(pr) : null;
    recalcTotal();
  }

  // Cuando cambia la cantidad → recalcula
  cantEl.addEventListener('input', recalcTotal);
  cantEl.addEventListener('change', recalcTotal);

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function renderDropdown(query) {
    const q = query.trim().toLowerCase();
    const matches = q
      ? CATALOGO.filter(p => p.nombre.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q))
      : CATALOGO;

    if (matches.length === 0) {
      dropdown.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text3)">Sin resultados</div>';
      dropdown.classList.add('open');
      return;
    }

    // Agrupar por categoría
    const cats = {};
    matches.forEach(p => {
      if (!cats[p.cat]) cats[p.cat] = [];
      cats[p.cat].push(p);
    });

    let html = '';
    Object.entries(cats).forEach(([cat, items]) => {
      html += `<div class="prod-cat">${cat}</div>`;
      items.forEach(item => {
        const precioStr = item.precio ? `$${item.precio.toLocaleString('es-AR')} c/u` : '';
        html += `<div class="prod-option" data-nombre="${item.nombre}" data-precio="${item.precio||''}">
          <span>${highlight(item.nombre, q)}</span>
          ${precioStr ? `<span class="prod-precio">${precioStr}</span>` : '<span class="prod-precio" style="color:var(--text3);font-weight:400">Ingresar precio</span>'}
        </div>`;
      });
    });

    dropdown.innerHTML = html;
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.prod-option').forEach(opt => {
      opt.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = opt.dataset.nombre;
        setPrecioUnitario(opt.dataset.precio);
        dropdown.classList.remove('open');
        // Si no tiene precio fijo, enfocar el campo precio
        if (!opt.dataset.precio) {
          setTimeout(() => { precioEl.focus(); precioEl.select(); }, 50);
        }
      });
    });
  }

  input.addEventListener('focus', () => renderDropdown(input.value));
  input.addEventListener('input', () => {
    // Al escribir libremente, buscar si coincide exactamente con un producto del catálogo
    const match = CATALOGO.find(p => p.nombre.toLowerCase() === input.value.trim().toLowerCase());
    setPrecioUnitario(match ? match.precio : null);
    renderDropdown(input.value);
  });
  input.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('open'), 150);
  });
}

function savePedido(id) {
  const cliente = document.getElementById('f-cliente').value.trim();
  const fecha = document.getElementById('f-fecha').value;
  if (!cliente || !fecha) { showToast('⚠️ Completá cliente y fecha'); return; }
  if (_pedidoItems.length === 0) { showToast('⚠️ Agregá al menos un producto'); return; }

  const precio = _pedidoItems.reduce((s, i) => s + i.subtotal, 0);
  // Resumen de productos para mostrar en la lista
  const producto = _pedidoItems.map(i => `${i.cantidad}x ${i.producto}`).join(', ');

  const data = {
    cliente,
    producto,
    items: _pedidoItems,
    cantidad: _pedidoItems.reduce((s, i) => s + i.cantidad, 0),
    precio,
    fechaEntrega: fecha,
    hora: document.getElementById('f-hora').value || '12:00',
    estado: document.getElementById('f-estado').value,
    pagado: id ? state.pedidos.find(p=>p.id===id)?.pagado || false : false,
    notas: document.getElementById('f-notas').value.trim(),
  };

  if (id) {
    const idx = state.pedidos.findIndex(p => p.id === id);
    state.pedidos[idx] = { ...state.pedidos[idx], ...data };
  } else {
    state.pedidos.push({ id: nextId(), ...data });
  }
  saveState(); closeModal();
  showToast(id ? '✏️ Pedido actualizado' : '📦 Pedido creado');
  renderScreen(activeScreen);
  // Esperar un tick para que el SW esté listo antes de programar
  if (Notification.permission === 'granted') {
    setTimeout(() => programarAlertas1Hora(), 500);
  }
}

function saveIngrediente(id) {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { showToast('⚠️ Ingresá un nombre'); return; }

  const costoEl = document.getElementById('f-costo');
  const costo = costoEl ? parsePrecio(costoEl.value) : 0;

  const data = {
    nombre,
    stock: parseFloat(document.getElementById('f-stock').value) || 0,
    ideal: parseFloat(document.getElementById('f-ideal').value) || 1,
    unidad: document.getElementById('f-unidad').value,
  };

  if (id) {
    const idx = state.ingredientes.findIndex(i => i.id === id);
    state.ingredientes[idx] = { ...state.ingredientes[idx], ...data };
    saveState(); closeModal();
    showToast('✏️ Ingrediente actualizado');
  } else {
    state.ingredientes.push({ id: nextId(), ...data });
    // Auto-registrar egreso si se ingresó un costo
    if (costo > 0) {
      state.movimientos.unshift({
        id: nextId(),
        tipo: 'expense',
        descripcion: `Compra de ${nombre}`,
        monto: costo,
        fecha: todayStr(),
        auto: true,
      });
      saveState(); closeModal();
      showToast(`🧂 Agregado · 💸 Egreso de ${fmt(costo)} registrado en Finanzas`);
    } else {
      saveState(); closeModal();
      showToast('🧂 Ingrediente agregado');
    }
  }
  renderScreen(activeScreen);
}

function confirmEliminarIngrediente(id) {
  const i = state.ingredientes.find(x => x.id === id);
  showConfirm('¿Eliminar ingrediente?', `Se eliminará "${i.nombre}" del stock.`, () => {
    state.ingredientes = state.ingredientes.filter(x => x.id !== id);

  });
}

// Autocomplete en campo "Nombre" del formulario de ingrediente
// Sugiere ingredientes YA existentes para evitar duplicados y facilitar edición
function initIngNombreAutocomplete(editingId) {
  const input    = document.getElementById('f-nombre');
  const dropdown = document.getElementById('ing-nombre-dropdown');
  if (!input || !dropdown) return;

  // Usar position:fixed para que el dropdown no quede cortado por el overflow del modal
  dropdown.style.position = 'fixed';
  dropdown.style.zIndex   = '9999';
  dropdown.style.display  = 'none';
  dropdown.style.maxHeight = '200px';
  dropdown.style.overflowY = 'auto';

  function positionDropdown() {
    const rect = input.getBoundingClientRect();
    dropdown.style.left  = rect.left + 'px';
    dropdown.style.top   = (rect.bottom + 4) + 'px';
    dropdown.style.width = rect.width + 'px';
  }

  function normalizar(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }
  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function showDropdown(val) {
    const q = normalizar(val.trim());
    if (!q) { hideDropdown(); return; }

    // Sugerir ingredientes existentes que coincidan (excluyendo el que se edita)
    const matches = state.ingredientes.filter(ing =>
      ing.id !== editingId && normalizar(ing.nombre).includes(q)
    );

    if (matches.length === 0) { hideDropdown(); return; }

    dropdown.innerHTML = matches.map(ing => {
      const pct = stockPct(ing);
      const pctColor = pct >= 60 ? 'var(--green)' : pct >= 30 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="cliente-option"
        data-nombre="${ing.nombre.replace(/"/g,'&quot;')}" data-stock="${ing.stock}"
        data-ideal="${ing.ideal}" data-unidad="${ing.unidad}">
        <span class="cliente-option-name">${highlight(ing.nombre, q)}</span>
        <span class="cliente-option-meta" style="color:${pctColor}">
          Stock: ${ing.stock} ${ing.unidad}
        </span>
      </div>`;
    }).join('');

    positionDropdown();
    dropdown.style.display = 'block';
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.cliente-option').forEach(opt => {
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        // Pone el nombre exacto en el campo
        input.value = opt.dataset.nombre;
        hideDropdown();
        // Enfocar el campo stock para que siga completando
        setTimeout(() => document.getElementById('f-stock')?.focus(), 50);
      });
    });
  }

  function hideDropdown() {
    dropdown.classList.remove('open');
    dropdown.style.display = 'none';
  }

  input.addEventListener('input', () => showDropdown(input.value));
  input.addEventListener('focus', () => { if (input.value) showDropdown(input.value); });
  input.addEventListener('blur', () => setTimeout(() => hideDropdown(), 180));

  // Reposicionar si el modal se scrollea
  const modalSheet = document.querySelector('.modal-sheet');
  if (modalSheet) {
    modalSheet.addEventListener('scroll', () => {
      if (dropdown.style.display === 'block') positionDropdown();
    });
  }
}

      <button class="btn btn-primary w-100" onclick="saveMovimiento()">💾 Guardar</button>
    </div>
  `);
  setTimeout(() => initMovDescAutocomplete(), 50);
}

// ID del ingrediente detectado en el campo descripción
let _movIngredienteId = null;

function onTipoMovChange() {
  // Limpiar ingrediente detectado cuando cambia el tipo
  _movIngredienteId = null;
  document.getElementById('mov-cantidad-box').style.display = 'none';
  document.getElementById('mov-desc-dropdown').classList.remove('open');
}

function onDescMovInput(val) {
  initMovDescAutocomplete._lastQuery = val;
}

function initMovDescAutocomplete() {
  const input    = document.getElementById('f-desc');
  const dropdown = document.getElementById('mov-desc-dropdown');
  if (!input || !dropdown) return;

  function normalizar(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function showDropdown(val) {
    const q = normalizar(val.trim());
    if (!q) { dropdown.classList.remove('open'); _movIngredienteId = null; hideMovCantidad(); return; }

    // Buscar ingredientes que coincidan
    const matches = state.ingredientes.filter(ing =>
      normalizar(ing.nombre).includes(q)
    );

    if (matches.length === 0) {
      dropdown.classList.remove('open');
      // Si no hay coincidencia, ocultar caja de cantidad
      _movIngredienteId = null;
      hideMovCantidad();
      return;
    }

    dropdown.innerHTML = matches.map(ing => {
      const pct = stockPct(ing);
      const pctColor = pct >= 60 ? 'var(--green)' : pct >= 30 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="cliente-option" data-id="${ing.id}" data-nombre="${ing.nombre}" data-unidad="${ing.unidad}">
        <span class="cliente-option-name">${highlight(ing.nombre, q)}</span>
        <span class="cliente-option-meta" style="color:${pctColor}">Stock: ${ing.stock} ${ing.unidad}</span>
      </div>`;
    }).join('');
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.cliente-option').forEach(opt => {
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        const tipo = document.getElementById('f-tipo').value;
        input.value = opt.dataset.nombre;
        _movIngredienteId = parseInt(opt.dataset.id);
        dropdown.classList.remove('open');
        // Solo mostrar caja de cantidad si es un egreso
        if (tipo === 'expense') showMovCantidad(opt.dataset.unidad);
        else hideMovCantidad();
        // Enfocar el campo monto
        setTimeout(() => document.getElementById('f-monto')?.focus(), 50);
      });
    });
  }

  input.addEventListener('input', () => {
    _movIngredienteId = null;
    hideMovCantidad();
    showDropdown(input.value);
  });
  input.addEventListener('focus', () => { if (input.value) showDropdown(input.value); });
  input.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('open'), 150));
}

function showMovCantidad(unidad) {
  const box = document.getElementById('mov-cantidad-box');
  const span = document.getElementById('mov-ing-unidad');
  if (box) box.style.display = 'block';
  if (span) span.textContent = unidad || 'un';
}
function hideMovCantidad() {
  const box = document.getElementById('mov-cantidad-box');
  if (box) box.style.display = 'none';
}

function saveMovimiento() {
  const desc = document.getElementById('f-desc').value.trim();
  const monto = parseFloat(document.getElementById('f-monto').value);
  if (!desc || !monto) { showToast('⚠️ Completá todos los campos'); return; }

  // Si hay un ingrediente detectado y se ingresó cantidad, actualizar stock
  const cantEl = document.getElementById('f-cant-stock');
  const cant = cantEl ? parseFloat(cantEl.value) : 0;
  let stockActualizado = false;
  if (_movIngredienteId && cant > 0) {
    const ing = state.ingredientes.find(x => x.id === _movIngredienteId);
    if (ing) {
      ing.stock = Math.round((ing.stock + cant) * 100) / 100;
      stockActualizado = true;
    }
  }

  state.movimientos.unshift({
    id: nextId(),
    tipo: document.getElementById('f-tipo').value,
    descripcion: desc,
    monto,
    fecha: document.getElementById('f-fecha-mov').value || todayStr(),
    auto: false,
  });
  _movIngredienteId = null;
  saveState(); closeModal();
  showToast(stockActualizado ? '💰 Movimiento registrado · 🧂 Stock actualizado' : '💰 Movimiento registrado');
  renderScreen(activeScreen);
}

function saveNota(id) {
  const texto = document.getElementById('f-nota-texto').value.trim();

  const data = {
    texto,

  };

    state.notas[idx] = { ...state.notas[idx], ...data };

    state.notas.push({ id: nextId(), ...data });

  showToast(id ? '✏️ Nota actualizada' : '📝 Nota guardada');

// Obtener lista de clientes únicos con estadísticas
function getClientes() {
  const mapa = {};
  state.pedidos.forEach(p => {
    const nombre = p.cliente.trim();
    if (!nombre) return;
    if (!mapa[nombre]) {
      mapa[nombre] = { nombre, pedidos: [], totalGastado: 0, ultimoPedido: '' };
    }
    mapa[nombre].pedidos.push(p);
    mapa[nombre].totalGastado += p.precio || 0;
    if (!mapa[nombre].ultimoPedido || p.fechaEntrega > mapa[nombre].ultimoPedido) {
      mapa[nombre].ultimoPedido = p.fechaEntrega;
    }
  });
  return Object.values(mapa).sort((a, b) => b.totalGastado - a.totalGastado);
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') showToast('🔔 Notificaciones activadas!');
  }
}

function sendNotification(title, body) {
  if (Notification.permission !== 'granted') {
    console.warn('Notificaciones no habilitadas');
    return;
  }
  try {
    new Notification(title, {
      body,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍰</text></svg>',
      tag: 'toque-artesano-' + Date.now(),
      requireInteraction: false,
    });
    console.log('🔔 Notificación enviada:', title);
  } catch(e) {
    console.error('Error enviando notificación:', e);
  }
}
// Exponer globalmente para poder llamar desde consola
window.sendNotification = sendNotification;
window.testNotif = function() { sendNotification('🍰 Prueba', 'Las notificaciones funcionan!'); };

function getPedidosHoy() {
  const hoy = todayStr();
  return state.pedidos.filter(p => p.fechaEntrega === hoy && p.estado !== 'done');
}

function getNotasHoy() {
  const hoy = todayStr();
  return state.notas.filter(n => n.fecha === hoy);
}

function buildResumenDiario() {
  const pedidos = getPedidosHoy();
  const notas = getNotasHoy();
  let body = '';
  if (pedidos.length > 0) {
    body += `📦 ${pedidos.length} pedido${pedidos.length > 1 ? 's' : ''} para hoy: ${pedidos.map(p => p.cliente).join(', ')}
`;
  }
  if (notas.length > 0) {
    body += `📝 ${notas.length} nota${notas.length > 1 ? 's' : ''} de hoy`;
  }
  return body.trim();
}

function programarNotificacionDiaria() {
  if (Notification.permission !== 'granted') return;
  const ahora = new Date();
  const objetivo = new Date();
  objetivo.setHours(7, 0, 0, 0);
  if (ahora >= objetivo) objetivo.setDate(objetivo.getDate() + 1);
  const msHasta = objetivo.getTime() - ahora.getTime();
  if (window._notifTimer) clearTimeout(window._notifTimer);
  // Usar SW para la notificación de las 7am
  const fireAt7am = objetivo.getTime();
  scheduleNotifViaSW(
    'notif-7am-' + objetivo.toDateString(),
    '☀️ Buenos días, Toque Artesano de Sofi!',
    buildResumenDiario() || 'No tenés pedidos ni notas para hoy 🎉',
    fireAt7am
  );
  // Reprogramar para el día siguiente via setTimeout
  window._notifTimer = setTimeout(() => {
    programarNotificacionDiaria();
    setTimeout(() => programarAlertas1Hora(), 5000);
  }, msHasta);
  const h = Math.floor(msHasta / 3600000);
  const m = Math.floor((msHasta % 3600000) / 60000);
  console.log(`🔔 Notificación en ${h}h ${m}m`);
}

function testNotificacion() {
  const body = buildResumenDiario();
  sendNotification('🍰 Vista previa — Toque Artesano',
    body || 'Sin pedidos ni notas para hoy ✨');
}

async function activarNotificaciones() {
  await requestNotificationPermission();
  if (Notification.permission === 'granted') {
    programarNotificacionDiaria();
    programarAlertas1Hora();
  }
  updateBellIcon();
  renderInicio();
}
window.activarNotificaciones = activarNotificaciones;

function toggleNotificaciones() {
  if (Notification.permission === 'default') {
    activarNotificaciones();
  } else if (Notification.permission === 'granted') {
    // Mostrar mini popup de estado
    showToast('🔔 Notificaciones activas — se envían a las 7am y 1h antes de cada pedido');
  } else {

  }
}

function updateBellIcon() {
  const btn = document.getElementById('bell-btn');
  const dot = document.getElementById('bell-dot');
  if (!btn) return;
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔';
    btn.style.opacity = '1';
    if (dot) dot.style.display = 'none';
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕';
    btn.style.opacity = '0.5';
    if (dot) dot.style.display = 'none';
  } else {
    btn.textContent = '🔔';
    btn.style.opacity = '0.5';
    if (dot) { dot.style.display = 'block'; } // puntito rojo = no activado
  }
}

// Programar alertas 1 hora antes de cada pedido del día
function programarAlertas1Hora() {
  if (Notification.permission !== 'granted') return;

  // Limpiar timers previos
  if (window._pedidoTimers) window._pedidoTimers.forEach(t => clearTimeout(t));
  window._pedidoTimers = [];

  const hoy = todayStr();
  const ahora = new Date();
  let programados = 0;

  state.pedidos.forEach(p => {
    if (p.estado === 'done' || p.fechaEntrega !== hoy) return;

    const horaEntrega = p.hora || '12:00';
    const [hh, mm] = horaEntrega.split(':').map(Number);

    // Construir fecha/hora exacta de entrega HOY
    const entrega = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), hh, mm, 0, 0);
    // Alerta = 1 hora antes de la entrega
    const alerta1h = new Date(entrega.getTime() - 60 * 60 * 1000);
    // Alerta = 15 minutos antes (por si la de 1h ya pasó)
    const alerta15m = new Date(entrega.getTime() - 15 * 60 * 1000);

    const ms1h = alerta1h.getTime() - ahora.getTime();
    const ms15m = alerta15m.getTime() - ahora.getTime();

    console.log(`📦 "${p.cliente}" entrega ${horaEntrega} → 1h antes en ${Math.round(ms1h/60000)}min · 15m antes en ${Math.round(ms15m/60000)}min`);

    // Programar alerta de 1 hora antes
    if (ms1h > 0) {
      scheduleNotifViaSW(
        `pedido-1h-${p.id}`,
        `⏰ Pedido en 1 hora — ${p.cliente}`,
        `${p.producto} · Entrega a las ${horaEntrega}`,
        alerta1h.getTime()
      );
      programados++;
      console.log(`  ↳ Alerta 1h programada en ${Math.round(ms1h/60000)} min`);
    }

    // Programar alerta de 15 minutos antes
    if (ms15m > 0) {
      scheduleNotifViaSW(
        `pedido-15m-${p.id}`,
        `🚨 Pedido en 15 min — ${p.cliente}`,
        `${p.producto} · Entrega a las ${horaEntrega}`,
        alerta15m.getTime()
      );
      programados++;
      console.log(`  ↳ Alerta 15m programada en ${Math.round(ms15m/60000)} min`);
    }

    if (ms1h <= 0 && ms15m <= 0) {
      console.log(`  ↳ Ya pasó la hora de entrega, no se programa`);
    }
  });

  // Notas del día — recordatorio a las 11pm
  const notasHoy = getNotasHoy();
  if (notasHoy.length > 0) {
    const fin = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), 23, 0, 0, 0);
    const msHastaFin = fin.getTime() - ahora.getTime();
    if (msHastaFin > 0) {
      const t = setTimeout(() => {
        sendNotification(
          `📝 Recordatorio de notas`,
          `Tenés ${notasHoy.length} nota${notasHoy.length > 1 ? 's' : ''} para hoy`
        );
      }, msHastaFin);
      window._pedidoTimers.push(t);
    }
  }

  console.log(`🔔 ${programados} alerta(s) de pedido programada(s)`);
}
window.programarAlertas1Hora = programarAlertas1Hora;
window.programarNotificacionDiaria = programarNotificacionDiaria;

/* ============================================================
   INIT — Firebase load then render
============================================================ */
// Registrar Service Worker
async function registrarSW() {
  if (!('serviceWorker' in navigator)) {
    console.warn('Service Worker no soportado');
    return null;
  }
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    console.log('[App] Service Worker registrado:', reg.scope);
    // Esperar a que esté completamente activo y controlando
    await navigator.serviceWorker.ready;
    // Si hay un SW nuevo esperando, activarlo
    if (reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
    console.log('[App] SW listo, controller:', !!navigator.serviceWorker.controller);
    return reg;
  } catch(e) {
    console.error('[App] Error registrando SW:', e);
    return null;
  }
}

// Enviar notificación via Service Worker (funciona en segundo plano)
async function scheduleNotifViaSW(id, title, body, fireAt) {
  try {
    // Esperar a que el SW esté listo y controlando la página
    const reg = await navigator.serviceWorker.ready;
    // Forzar que el SW tome control si todavía no lo hizo
    if (!navigator.serviceWorker.controller) {
      console.warn('[App] SW aún no controla, esperando...');
      await new Promise(resolve => {
        const handler = () => { resolve(); navigator.serviceWorker.removeEventListener('controllerchange', handler); };
        navigator.serviceWorker.addEventListener('controllerchange', handler);
        // Timeout de seguridad — 3 segundos
        setTimeout(resolve, 3000);
      });
    }
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'SCHEDULE_NOTIFICATION',
        payload: { id, title, body, fireAt }
      });
      console.log(`[App] ✅ Notif "${title}" enviada al SW, dispara en ${Math.round((fireAt - Date.now())/60000)} min`);
    } else {
      // Fallback final con setTimeout
      console.warn('[App] SW no disponible, usando setTimeout como fallback');
      const ms = fireAt - Date.now();
      if (ms > 0) setTimeout(() => sendNotification(title, body), ms);
    }
  } catch(e) {
    console.error('[App] Error enviando al SW:', e);
    const ms = fireAt - Date.now();
    if (ms > 0) setTimeout(() => sendNotification(title, body), ms);
  }
}

function testNotifSW() {
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'TEST_NOTIFICATION' });
  } else {
    sendNotification('🍰 Prueba', 'Funcionando!');
  }
}
window.testNotif = testNotifSW;

updateHeaderDate();
registrarSW().then(() => {
  loadFromFirebase().then(() => {
    setupRealtimeSync();
    if (Notification.permission === 'granted') {
      programarNotificacionDiaria();
      programarAlertas1Hora();
    }
    updateBellIcon();
  });
});
</script>
